    z_register: 2
    z_rationale: "Performed by ritual specialists (misayuq) in specific ceremonial contexts — not everyday speech."
    source: "Mannheim, Bruce. 'Places That Talk—and Listen: Southern Quechua.' In Tavárez, David (ed.), The Oxford Handbook of Ritual Language (Oxford University Press, 2025), Part IV. Oxford Academic: academic.oup.com/edited-volume/59477/chapter-abstract/501384245"
    notes: "Cutting-edge 2025 scholarship. Chapter abstract only available; full text behind paywall. Mannheim is the leading scholar of Quechua verbal art."
