  - id: "QCH_001"
    tradition: "Quechua Semantic Parallelism"
    language: "Southern Quechua (colonial)"
    host_word: "Unuy wiqillam apariwan / Yakuy parallam pusariwan"
    host_romanized: "unu/yaku (water) + wiqi/para (tears/rain)"
    covert_target: "Human tears equated with cosmic rain; personal grief situated within the cycle of the natural world"
    x_type: [0.0, 0.3, 0.7]
    x_rationale: "S-dominant (0.7): the parallel couplet structure (synonymous water-words in parallel syntactic slots) generates the cosmological equation grief=rain — a third meaning that neither term pair alone encodes outside the couplet context. E-component (0.3): active construction of cosmological equivalence through the parallelism device."
    y_vector: "Formal+Conceptual"
    y_detail: "Formal (PRIMARY): the parallel couplet structure is the PRIMARY mechanism — it forces semantic equivalence between unu/yaku (water synonyms) and wiqi/para (tears/rain synonyms), generating the synthesis. Without the parallelism form, there is no covert path. Conceptual (secondary): the cosmological equation maps personal grief onto cosmic rain cycle. NOTE: old y_vector 'Structural' referred to syntactic parallelism, which is re-classified as Formal in v3.0."
    z_register: 2
    z_rationale: "Ritual song performed in specific festival/ceremonial contexts; attested in Guaman Poma's chronicle (1615) as performed verbal art."
    source: "Mannheim, Bruce. 'Time, not the syllables, must be counted: Quechua parallelism, word meaning, and cultural analysis.' ResearchGate (accessible at researchgate.net/publication/283015094); Guaman Poma de Ayala, Felipe. Nueva Crónica y Buen Gobierno (c. 1615)"
    notes: "Mannheim (The Language of the Inka since the European Invasion, U. of Texas Press, 1991) analyzes this as the core structural principle of ritual Quechua verbal art — invisible to colonial writers for centuries."
    confidence: "high"
    recode_note: "v3.0: x_type scalar 0.7 → ternary (r=0.0, e=0.3, s=0.7); y_vector Conceptual+Structural → Formal+Conceptual — old 'Structural' (syntactic parallelism) is the Formal vector in v3.0; Formal is the PRIMARY mechanism here. Most significant reclassification in this update."

  - id: "QCH_002"
    tradition: "Quechua Ritual Vocabulary (colonial semantic layering)"
    language: "Quechua (colonial period)"
    host_word: "Supay"
    host_romanized: "Supay"
    covert_target: "Original: spirit/shade of the dead (ambivalent, indigenous); imposed overlay: Christian devil (Spanish missionary reuse)"
    x_type: [0.7, 0.3, 0.0]
    x_rationale: "R-dominant (0.7): the original indigenous spirit-concept was semantically colonized; the indigenous meaning retreated behind the imposed 'devil' reading. E-component (0.3): Spanish missionaries actively RE-coded the word with a new imposed meaning (colonial recodification as E-direction operation). No S-component: single word, not a binary pairing."
    y_vector: "Conceptual"
    y_detail: "Abstract mapping imposed by Spanish missionaries: indigenous spirit-world intermediary → Christian devil. Both meanings coexist in the same word, creating a dual-layer reading accessible to different audiences."
    z_register: 3
    z_rationale: "Used in colonial pastoral, public religious discourse, and evangelical instruction — widely disseminated through church sermons and colonial dictionaries."
    source: "González Holguín, Diego. Vocabulario de la lengua general de todo el Perú. 1608; Anonymous dictionary, 1586; Wikipedia: Supay (citing both sources)"
    notes: "flag: true — this is a case of imposed semantic layering (colonial contact) rather than indigenous creation. Bartolomé Álvarez objected to this equation. Dual-layer reading is historically documented."
    confidence: "medium"
    recode_note: "v3.0: x_type scalar 0.2 → ternary (r=0.7, e=0.3, s=0.0); E-component made explicit (colonial re-coding is an E-direction operation); no S-component (single word). y_vector unchanged."

  - id: "QCH_003"
    tradition: "Quechua Cosmological Terminology"
    language: "Quechua (pre-colonial and colonial)"
    host_word: "Ukhu Pacha / Hanaq Pacha"
    host_romanized: "ukhu pacha / hanaq pacha"
    covert_target: "Pre-colonial: death-and-rebirth duality / upper world of life; Colonial overlay: hell / heaven"
    x_type: [0.5, 0.1, 0.4]
    x_rationale: "R-dominant (0.5): original cosmological meanings retreated under colonial overlay. S-component (0.4): the paired opposition ukhu/hanaq (below/above) together generates the complete cosmological duality — a worldview neither term alone expresses. Minimal E (0.1)."
    y_vector: "Conceptual"
    y_detail: "Spatial metaphor: below/above maps onto cosmological status. Pacha = spacetime simultaneously (not just place). The dual-reading emerges from contact between indigenous cosmology (death-and-rebirth in ukhu pacha) and colonial Christian framework (hell/heaven)."
    z_register: 3
    z_rationale: "Used both in ritual language and colonial religious discourse — widely disseminated."
    source: "Wikipedia: Pacha (Inca mythology); Incamedicineschool.com: 'Exploring Ukhu Pacha'; Allen, Catherine J. The Hold Life Has (Smithsonian Institution Press, 1988)"
    notes: "flag: true — the dual reading is partly a product of colonial contact. Pacha as 'spacetime' is the key scholarly insight (Manga Qespi; Catherine Allen)."
    confidence: "medium"
    recode_note: "v3.0: x_type scalar 0.3 → ternary (r=0.5, e=0.1, s=0.4); S-component added (0.4) for paired cosmological opposition; R elevated as primary. y_vector unchanged."

  - id: "QCH_004"
    tradition: "Quechua Riddle Tradition (Watuchikuna)"
    language: "Quechua (Southern, contemporary)"
    host_word: "Watuchikuna (riddle objects: needle, corn, natural implements)"
    host_romanized: "watuchikuna / watuchis"
    covert_target: "Sexual/bodily meaning expressed through innocent natural-object descriptions"
    x_type: [0.8, 0.0, 0.2]
    x_rationale: "R-dominant (0.8): sexual meaning retreats behind innocent object descriptions — classic avoidance mechanism. Small S-component (0.2): some riddles pair two objects in synthesis, but the primary mechanism is R. No E-component."
    y_vector: "Structural+Morphological"
    y_detail: "Physical and functional properties of objects (shape, action of use, entry into holes) structurally parallel bodily/sexual referents. The game is simultaneously an intellectual contest and a vehicle for covert sexual socialization."
    z_register: 1
    z_rationale: "Performed in adolescent courtship and socialization contexts — dyadic/in-group, intimate setting."
    source: "Isbell, Billie Jean and Roncalla Fernandez, Fredy Amilcar. 'The Ontogenesis of Metaphor: Riddle Games among Quechua Speakers Seen as Cognitive Discovery Procedures.' Journal of Latin American Lore 3:1 (1977): 19-49. Full text: ecommons.cornell.edu"
    notes: "Isbell & Roncalla (1977) is one of the earliest peer-reviewed treatments of indigenous Andean riddle tradition. Solid ethnographic attestation."
    confidence: "high"
    recode_note: "v3.0: x_type scalar 0.2 → ternary (r=0.8, e=0.0, s=0.2); small S-component added for riddle-pairing elements; R dominant confirmed. y_vector unchanged."

  - id: "QCH_005"
    tradition: "Quechua Shamanic Ritual (K'intu)"
    language: "Quechua (Andean ceremonial)"
    host_word: "K'intu (kintu, quintu)"
    host_romanized: "k'intu"
    covert_target: "Covert prayer/intention addressed to mountain spirits (Apus) and Pachamama; also encodes three-world cosmological structure"
    x_type: [0.3, 0.6, 0.1]
    x_rationale: "E-dominant (0.6): the three-leaf arrangement actively encodes the three-world cosmology — a designed covert communication system. R-component (0.3): avoidance of direct spirit address (prayer transmitted via leaves, not spoken directly). Small S-component (0.1): the three leaves together encode more than any individual leaf, but this is not strictly binary synthesis."
    y_vector: "Structural+Conceptual"
    y_detail: "Physical arrangement of three coca leaves (smallest on top, stems down) structurally encodes the three-world cosmology (Ukhu/Kay/Hanaq Pacha). The act of pukuy (blowing) transmits intentions not spoken aloud — the leaves become a covert communication channel."
    z_register: 2
    z_rationale: "Performed in shamanic/priestly rituals (paqo practice, Pachamama offerings) — periodic ceremonial contexts."
    source: "Retreatsinperu.com: 'Kintu Ritual: The Three Sacred Coca Leaves of the Incas'; Kurakatravel.com: 'Sacred Kintu: Coca Leaf Offerings in Andean Ceremony'; multiple Andean ethnographic sources"
    notes: "Sources are ethnographic/practitioner, not peer-reviewed — lower confidence than QCH_001 or QCH_004. The physical-cosmological encoding is well-attested across multiple independent sources."
    confidence: "medium"
    recode_note: "v3.0: x_type scalar 0.6 → ternary (r=0.3, e=0.6, s=0.1); E-dominant confirmed; R and minimal S made explicit. y_vector unchanged."

