  key_findings: |
    Central/South America is exceptionally rich in CPG traditions. Three distinct structural patterns emerged:

    1. **Difrasismo as the dominant mechanism**: All three culture regions share the difrasismo/diphrasis device — two concrete terms paired to generate a third, covert meaning inaccessible without insider knowledge. This device is architecturally identical to CPG: a surface channel carrying a covert payload unlockable only by those with the cultural key. The Nahuatl corpus (Florentine Codex, Online Nahuatl Dictionary) is the most rigorously documented, with explicit scholarly glosses confirming covert meanings.

    2. **Register-gating and legitimacy screening (unique to this region)**: The Zuyua T'an (MAYA_004) is the most directly CPG-relevant finding in this survey — a documented pre-Columbian linguistic security protocol using surface-impossible commands to encode mundane correct answers, used to screen elite legitimacy. No equivalent explicit security-screening function was found in other regions' traditions.

    3. **Colonial semantic layering adds a second covert-path dimension**: In Quechua (QCH_002, QCH_003), colonial contact created dual-layer readings where indigenous and imposed meanings coexist. This is a historically documented form of meaning-concealment under political surveillance — the original meaning persists as a hidden layer below the imposed surface.

    The Nahuatl difrasismo NAH_008 (in toptli, in petlacalli = "secret") is particularly notable: the Nahua had a dedicated covert-path construction for encoding the concept of concealment itself, suggesting meta-awareness of the CPG mechanism within the tradition.

    **v3.0 Re-coding Findings (2026-03-13)**:
    - **S-dominance confirmed**: 14 of 20 items are S-dominant (s >= 0.4), reflecting the difrasismo/diphrasis mechanism as the primary CPG pathway in this region. This distinguishes Central/South America from traditions relying primarily on R (taboo avoidance) or E (single-word poetic invention).
    - **Formal vector: 14 items**: All difrasismo (NAH_001–NAH_008), all Maya diphrasis couplets (MAYA_001–005), and the Quechua semantic parallelism (QCH_001) received the Formal y-vector. The couplet/pairing FORM itself is integral to CPG generation — without the XiX or parallel structure, the synthesis cannot occur.
    - **QCH_001 reclassification**: The old y_vector "Structural" (syntactic parallelism) is now correctly classified as "Formal" — the most significant single reclassification in this v3.0 update.
    - **Key insight on S-component**: The difrasismo is the purest natural-language instantiation of the S-dimension: two terms juxtaposed, generating a third meaning that neither alone carries. All difrasismo items in this corpus have s >= 0.5.
