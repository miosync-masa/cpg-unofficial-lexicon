  - id: "NAH_001"
    tradition: "Nahuatl Difrasismo"
    language: "Classical Nahuatl"
    host_word: "in xochitl, in cuicatl"
    host_romanized: "in xochitl, in cuicatl"
    covert_target: "Poetry; the highest form of human truth; the medium through which one can approach divine reality (teotl)"
    x_type: [0.0, 0.3, 0.7]
    x_rationale: "S-dominant (0.7): two aesthetic objects (flower, song) are paired in the XiX difrasismo structure to synthesize 'poetry/divine truth' — a third concept neither term alone carries. E-component (0.3): the philosophical/rhetorical invention involved in assigning cosmological significance. Task YAML explicit example: (r=0, e=0.3, s=0.7)."
    y_vector: "Conceptual+Formal"
    y_detail: "Abstract analogy between sensory-aesthetic experience (flower, song) and philosophical-theological communication channel. Formal: the XiX difrasismo pairing structure itself generates the synthesis — without the couplet form, neither flower nor song alone yields the covert concept."
    z_register: 3
    z_rationale: "Found extensively in Cantares Mexicanos, Romances de los Señores de Nueva España, and Florentine Codex — widely performed and publicly quoted."
    source: "Leon-Portilla, Miguel. La Filosofia Nahuatl estudiada en sus fuentes. UNAM, 1956 (Engl. Aztec Thought and Culture, U. of Oklahoma Press, 1963); Cantares Mexicanos manuscript (16th c.)"
    notes: "Classic 'flower and song' is the most cited difrasismo; Leon-Portilla dedicates an entire chapter to it."
    confidence: "high"
    recode_note: "v3.0: x_type scalar 0.8 → ternary (r=0.0, e=0.3, s=0.7); S-component added per difrasismo synthesis rule; y_vector Conceptual → Conceptual+Formal (XiX pairing form integral to CPG generation)."

  - id: "NAH_002"
    tradition: "Nahuatl Difrasismo"
    language: "Classical Nahuatl"
    host_word: "in cuitlapilli, in ahtlapalli"
    host_romanized: "in cuitlapilli, in ahtlapalli"
    covert_target: "The common people; the macehualtin (commoners, subjects)"
    x_type: [0.0, 0.3, 0.7]
    x_rationale: "S-dominant (0.7): two peripheral bird-anatomy terms (tail + wing) synthesize the social concept 'commoners' — a third meaning neither term alone encodes. E-component (0.3): rhetorical invention by the ruler class who assigned this elevated pairing to their subjects."
    y_vector: "Metonymic+Conceptual+Formal"
    y_detail: "Metonymic framing: peripheral bird-body-parts stand for the social base of the hierarchy. Conceptual mapping overlaid: lowly anatomical position → social subordination. Formal: the XiX difrasismo pairing structure generates the synthesis — 'commoners' emerges only from the paired juxtaposition."
    z_register: 3
    z_rationale: "Attested in Florentine Codex Book 8 (Kings and Lords) and Sullivan 1963 — used in court oratory and widely documented."
    source: "Sullivan, Thelma D. 'Nahuatl Proverbs, Conundrums, and Metaphors, Collected by Sahagun.' Estudios de Cultura Nahuatl 4 (1963): 146-147; Sahagun/Anderson & Dibble, Florentine Codex Book 8 (School of American Research/U. of Utah, 1951)"
    notes: "Explicit gloss in Sullivan (1963): 'Cuitlapilli, in atlapalli. Quitoznequi: maceoalli' = 'The tail and the wing. This means the common people.'"
    confidence: "high"
    recode_note: "v3.0: x_type scalar 0.7 → ternary (r=0.0, e=0.3, s=0.7); S-component added per difrasismo synthesis rule; y_vector added Formal."

  - id: "NAH_003"
    tradition: "Nahuatl Difrasismo"
    language: "Classical Nahuatl"
    host_word: "in teoatl, in tlachinolli"
    host_romanized: "in teoatl, in tlachinolli"
    covert_target: "War; armed conflict; totality of military devastation"
    x_type: [0.3, 0.1, 0.6]
    x_rationale: "S-dominant (0.6): two forms of elemental catastrophe (divine water + conflagration) synthesize 'war' — neither term alone encodes total military devastation. R-component (0.3): avoidance of direct war-naming in ritual/oratorical context. Minimal E (0.1)."
    y_vector: "Conceptual+Structural+Formal"
    y_detail: "Two forms of environmental/elemental destruction (water-catastrophe + fire-catastrophe) structurally map onto war's dual destructive function. Conceptual analogy: total annihilation = war. Formal: the difrasismo pairing form enables synthesis — 'war' emerges from the juxtaposed catastrophe pair."
    z_register: 2
    z_rationale: "Found in Primeros Memoriales and Florentine Codex; used in ritual temple-dedication ceremonies and martial contexts — periodic, context-specific."
    source: "Molina, Alonso de. Vocabulario en lengua castellana y mexicana (1571) — entry glossed as 'batalla o guerra. metaphora'; Sahagun, Primeros Memoriales (16th c.); Online Nahuatl Dictionary (Wired Humanities/U. Oregon)"
    notes: "flag: true — X-axis S/R balance is debatable. Molina's explicit 'metaphora' gloss confirms it is a recognized indirect expression for war."
    confidence: "high"
    recode_note: "v3.0: x_type scalar 0.5 (hybrid R/E) → ternary (r=0.3, e=0.1, s=0.6); S-component added for difrasismo synthesis (two catastrophes → war); y_vector added Formal."

  - id: "NAH_004"
    tradition: "Nahuatl Difrasismo"
    language: "Classical Nahuatl"
    host_word: "in tlilli, in tlapalli"
    host_romanized: "in tlilli, in tlapalli"
    covert_target: "Books; writing; codices; wisdom; scribal and intellectual authority"
    x_type: [0.0, 0.3, 0.7]
    x_rationale: "S-dominant (0.7): two codex pigment colors (black + red) synthesize the concept 'scribal art/books' — neither color alone encodes writing. E-component (0.3): the meaning was actively invented and assigned."
    y_vector: "Chromatic+Formal"
    y_detail: "Color association: black and red pigments used in codex painting come to stand for the act of writing itself and by extension for all recorded knowledge. Formal: the difrasismo pairing of two colors generates the synthesis — 'writing' is the third concept created by juxtaposing the paired pigments."
    z_register: 3
    z_rationale: "Found in Florentine Codex Book 6 and Codex Chimalpahin; widely used in intellectual and priestly discourse."
    source: "Sahagun, Florentine Codex Book VI (Huehuetlatolli), Anderson & Dibble eds.; Codex Chimalpahin (early 17th c.); Sullivan (1963); Online Nahuatl Dictionary (Wired Humanities/U. Oregon)"
    notes: "Codex Chimalpahin contains the explicit statement: 'their black and their red — their books, their writings... will never perish.'"
    confidence: "high"
    recode_note: "v3.0: x_type scalar 0.8 → ternary (r=0.0, e=0.3, s=0.7); S-component added for difrasismo synthesis (black+red pigments → writing); y_vector Chromatic → Chromatic+Formal."

  - id: "NAH_005"
    tradition: "Nahuatl Difrasismo"
    language: "Classical Nahuatl"
    host_word: "in ixtli, in yollotl"
    host_romanized: "in ixtli, in yollotl"
    covert_target: "The complete human being; personhood; moral character and identity"
    x_type: [0.0, 0.4, 0.6]
    x_rationale: "S-dominant (0.6): two body parts (face/eye + heart) synthesize the philosophical concept of complete personhood — a third abstraction neither term alone encodes. E-component (0.4) higher than typical difrasismo: consciously theorized philosophical invention (Leon-Portilla's analysis)."
    y_vector: "Structural+Formal"
    y_detail: "Functional-structural properties: ixtli (face/eye) = outward identity and perception; yollotl (heart, from yoli 'to live') = inner vitality and essence. Their joint structural role in constituting a person encodes the full concept. Formal: the difrasismo pairing form generates the synthesis — 'personhood' is the third concept created by juxtaposing the two body-part terms."
    z_register: 2
    z_rationale: "Used in huehuetlatolli (elder wisdom speeches) — a specific pedagogical-moral discourse genre, not everyday speech."
    source: "Sahagun, Florentine Codex Book VI (Huehuetlatolli); Mikulska, Katarzyna. 'Te hago bandera...' in Los codices mesoamericanos (El Colegio Mexiquense, 2016): 85-133; peer-reviewed: 'In ixtli, in yollotl, un difrasismo nahuatl,' Universidad de Management Review (UPGTO/Dialnet, 2024)"
    notes: "Mikulska explicitly glosses: 'ojo-cara, corazon = un difrasismo que quiere decir ser humano.'"
    confidence: "high"
    recode_note: "v3.0: x_type scalar 0.9 → ternary (r=0.0, e=0.4, s=0.6); E-component elevated (0.4) vs. typical difrasismo (0.3) given philosophical invention character; y_vector Structural → Structural+Formal."

  - id: "NAH_006"
    tradition: "Nahuatl Difrasismo"
    language: "Classical Nahuatl"
    host_word: "in atl, in tepetl"
    host_romanized: "in atl, in tepetl (contracted: altepetl)"
    covert_target: "City; settlement; political community; sovereign territory; city-state"
    x_type: [0.0, 0.2, 0.8]
    x_rationale: "Strong S-dominant (0.8): two natural landscape features (water + mountain) synthesize the political concept 'city-state' — neither alone encodes the political community. Minimal E (0.2): conventional assignment of geographical features to a political concept. Task YAML analogous example: (r=0, e=0.2, s=0.8) for abstract social concepts from body-part pairs."
    y_vector: "Conceptual+Formal"
    y_detail: "Two natural features of the Mesoamerican landscape (water source + highland) stand conceptually for a complete political-territorial community. The pair encodes governance, people, and sacred character. Formal: the XiX difrasismo structure generates the synthesis — 'city-state' emerges only from the paired juxtaposition; the contracted form altepetl fully lexicalized from this formal pairing."
    z_register: 3
    z_rationale: "Ubiquitous in colonial Nahuatl legal documents, titles, land grants, and historical annals — one of the most widely attested difrasismo in the corpus."
    source: "Lockhart, James. The Nahuas After the Conquest. Stanford University Press, 1992; Mikulska (2016) — 'un difrasismo, agua-cerro, para decir ciudad'; Online Nahuatl Dictionary; Codex Osuna (colonial, 16th c.)"
    notes: "The contracted form altepetl became the standard word for city-state in colonial Nahuatl — the difrasismo fully lexicalized."
    confidence: "high"
    recode_note: "v3.0: x_type scalar 0.7 → ternary (r=0.0, e=0.2, s=0.8); strong S-dominance for landmark difrasismo that fully lexicalized; y_vector Conceptual → Conceptual+Formal. S三条件適用: 裁定[2]"
    lexicalization_note: "S三条件を歴史的に満たした語彙化事例 — 裁定[2]: (1)水＋山の並置(JUXTAPOSITION)✓ (2)都市国家という第三概念は水・山から計算不能(NON-COMPOSITIONALITY)✓ (3)Nahuatl文化圏全体で共有(CULTURAL CONVENTION)✓。ただし現在は単語altepetlとして固定化・形態統合済み。lexicalized_s事例として通時的注記。"

  - id: "NAH_007"
    tradition: "Nahuatl Difrasismo"
    language: "Classical Nahuatl"
    host_word: "in cuauhtli, in ocelotl"
    host_romanized: "in cuauhtli, in ocelotl"
    covert_target: "The warrior class; military valor; martial prowess; the elite military orders"
    x_type: [0.0, 0.3, 0.7]
    x_rationale: "S-dominant (0.7): two apex predators (eagle + jaguar) synthesize 'the warrior class' — the combined elite military identity neither term alone encodes. E-component (0.3): heraldic/poetic invention assigning apex animals to the elite warrior orders."
    y_vector: "Behavioral+Formal"
    y_detail: "Predatory behavior of apex animals (hunting, killing, dominance) maps onto warrior valor and martial capacity of the military elite. Formal: the difrasismo pairing structure generates the synthesis — 'warrior class as a unified martial category' emerges from the juxtaposition of the two separate military orders."
    z_register: 2
    z_rationale: "Found on ceremonial objects, in temple contexts, and warrior poetry — specific martial/ritual settings."
    source: "Codex Borbonicus (folio 9) — pictorial attestation; Garibay K., Angel Maria (general scholarly tradition); Mexicolore.co.uk 'Diphrases or couplets in Nahuatl' (citing Florentine Codex)"
    notes: "Both the eagle warriors (cuauhtli) and jaguar warriors (ocelotl) were actual elite military orders — the difrasismo names them together as a single social category."
    confidence: "high"
    recode_note: "v3.0: x_type scalar 0.8 → ternary (r=0.0, e=0.3, s=0.7); S-component added for difrasismo synthesis (eagle+jaguar → unified warrior class); y_vector Behavioral → Behavioral+Formal."

  - id: "NAH_008"
    tradition: "Nahuatl Difrasismo"
    language: "Classical Nahuatl"
    host_word: "in toptli, in petlacalli"
    host_romanized: "in toptli, in petlacalli"
    covert_target: "A secret; concealed matter; something hidden; confidential information"
    x_type: [0.5, 0.0, 0.5]
    x_rationale: "Equal R and S (0.5/0.5): R-component — the concept 'secret' retreats inside the image of closed containers (avoidance of direct naming); S-component — neither wooden chest alone nor reed basket alone fully encodes 'secret' in this culturally specific sense; the PAIR synthesizes the abstract concept of concealment. No E-component."
    y_vector: "Structural+Formal"
    y_detail: "Functional/structural property: closed containers (wooden chest, reed basket) hold hidden contents — the structural function of concealment maps onto the concept of a secret. Formal: the difrasismo pairing structure generates the synthesis — 'secret' as a culturally formalized concept emerges from the juxtaposition of two container types."
    z_register: 2
    z_rationale: "Used in administrative and interpersonal discourse when speaking of matters that must not be disclosed — specific confidential communication contexts."
    source: "Codex Mendoza (colonial period, ca. 1541) — pictorial and textual attestation; Mexicolore.co.uk 'Diphrases or couplets in Nahuatl'; Online Nahuatl Dictionary (thematic: 'Secrets/Hidden things')"
    notes: "This is the most directly CPG-relevant example — Nahuatl had a dedicated difrasismo for the concept of concealment itself. The covert path and its container are linguistically fused."
    confidence: "medium"
    recode_note: "v3.0: x_type scalar 0.2 (R-dominant) → ternary (r=0.5, e=0.0, s=0.5); S-component co-equal with R — the container pair also synthesizes 'secret' as third concept; y_vector Structural → Structural+Formal."

