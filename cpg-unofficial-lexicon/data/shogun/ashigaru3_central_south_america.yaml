    language: "Southern Quechua"
    host_word: "Ritual address to landscape entities (mountains, springs, fields)"
    host_romanized: "(speech act genre)"
    covert_target: "Dual-audience communication: ostensibly addressed to place/mountain, covertly addressed to spirit world AND functioning as public performance for human witnesses"
    x_type: [0.4, 0.4, 0.2]
