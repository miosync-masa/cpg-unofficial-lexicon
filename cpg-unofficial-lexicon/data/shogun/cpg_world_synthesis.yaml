    name: "Compound Vectors Are the Rule"
    status: "STRENGTHENED — 59.6% compound (up from 45.6% in v2.0, due to Formal additions)"

  pattern_4_public_covertness:
    name: "Public Repetition Preserves Covertness"
    status: "CONFIRMED (unchanged)"

  pattern_5_named_genres:
    name: "Named CPG Genres Exist Cross-Culturally"
    status: "CONFIRMED (unchanged)"

  # NEW in v3.0:
  pattern_6_compound_vs_unitary:
    name: "COMPOUND vs. UNITARY CPG Typological Split"
    status: "NEW v3.0 DISCOVERY"
    detail: |
      The S-dimension reveals a fundamental typological split in world CPG traditions:

      COMPOUND CPG (s ≥ 0.4 common): Binary juxtaposition generates emergent third meanings.
        - Central/South America: difrasismo (70% s-dominant)
        - Northern Europe: kenning compound (67% s-dominant)
        - Africa: compound epithets (27% s-dominant)

      UNITARY CPG (s ≈ 0): Single-word polysemy, inferential chains, or substitution.
        - Middle East: tawriya/kinaya/tevriye (0% s-dominant, mean s=0.05)
        - Eastern Europe: zagadka/bylina (0% s-dominant, mean s=0.09)

      MIXED: Both mechanisms coexist in the tradition.
        - Southeast Asia: pantun has moderate S (mean=0.24) but no s-dominant items
        - Oceania/Internet: mostly unitary, one s-dominant (OCE_007)

      This split correlates with linguistic structure: COMPOUND CPG traditions tend to use
      fixed pairing forms (difrasismo XiX, kenning A+B, pantun pembayang/isi) that
      STRUCTURALLY enable synthesis. UNITARY traditions lack such pairing forms.

