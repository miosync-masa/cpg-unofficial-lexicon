    recommendation: |
      Phase 1: Fit baseline model (12 params, df=102). Check R², residuals, VIF.
      Phase 2: Add interactions via forward stepwise (AIC/BIC criterion).
      Phase 3: If n insufficient, use ridge/LASSO regularization for full model.

  multicollinearity_risks:
    r_e_s_constraint:
      risk: "LOW after dropping R"
      note: "r+e+s=1 creates perfect collinearity if all three entered. Dropping R eliminates this. E and S may still correlate negatively (high S ↔ lower E in difrasismo/kenning traditions)."
      mitigation: "Check VIF for E and S. If VIF > 5, consider PCA on (E, S) space."

    y_formal_frequency:
      risk: "LOW"
      count: 32           # 28.1% of items have Formal=1
      note: "32/114 is adequate for binary predictor. Minimum recommended: ~10 items in minority class."
      regional_concentration: "Formal is concentrated in C/S America (14) and SE Asia (9). Regional confounding possible."
      mitigation: "Include region as random effect or control variable if Formal coefficient is unstable."

    y_chromatic_frequency:
      risk: "MODERATE"
      count: 5             # 4.4% of items have Chromatic=1
      note: "Only 5 items. This dummy may be unstable in regression."
      mitigation: "Consider merging Chromatic into Morphological or dropping from regression."

    compound_y_correlation:
      risk: "LOW-MODERATE"
      note: "59.6% of items have multiple Y=1 values. Some Y pairs may correlate (e.g., Conceptual often co-occurs with Structural)."
      mitigation: "Check pairwise phi coefficients between Y dummies. Merge highly correlated pairs if needed."

  s_dimension_specific_risks:
    coding_precision:
      risk: "S values are coded at ±0.1 precision. At n=114, can the model detect s=0.5 vs s=0.6?"
      mitigation: "Sensitivity analysis: refit model with S rounded to nearest 0.2 and compare coefficients."

    geographic_confounding:
      risk: "S correlates strongly with region (C/S America and N Europe have high S; Middle East has s≈0)."
      note: "If region is the true driver, S coefficient may be spurious."
      mitigation: "Test S with and without region fixed effects. If S coefficient drops to zero when region is included, S is a proxy for region, not an independent predictor."

  z_velocity_in_model:
    recommendation: |
      z_velocity is coded only for 7 internet items. Do NOT include in regression —
      insufficient variance. z_velocity is Phase 1 record-only (per SKILL.md).
      Future use: when internet CPG dataset expands to 30+ items, z_velocity can enter
      as a separate internet-specific sub-model.

  formal_dummy_note: |
    If Formal vector is NOT confirmed by Shogun (i.e., boundary remains unclear for bylina/zagadka):
    regression proceeds with current 32 confirmed Formal items. If Shogun expands definition to
    include bylina crystallization (+4 items) or praise-genre (+2 items), Formal count increases
    to 34-38 — still adequate for regression.

