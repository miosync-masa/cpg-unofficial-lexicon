    # x_type: 0.85  # v2.0 original
    x_r: 0.0
    x_e: 0.3
    x_s: 0.7
    x_rationale: "S-dominant: the proverb is a binary juxtaposition — 'returning' (A) + 'forgotten/lost thing' (B) — that synthesizes a third concept (cultural recovery mandate / program of historical restoration) that neither element alone carries. Pure S mechanism; E=0.3 for the active construction of philosophical meaning. R=0 (no taboo avoidance)."
    recode_note: "x_type=0.85 → (r=0.0, e=0.3, s=0.7). Major recode: x_type=0.85 was E-dominant but Sankofa is actually S-dominant (binary juxtaposition generating cultural recovery mandate). Comparable to difrasismo structure (SKILL.md example: s=0.7)."
