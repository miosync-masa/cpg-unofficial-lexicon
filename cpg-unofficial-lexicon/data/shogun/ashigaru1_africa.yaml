    notes: "The proverb generates a named concept (Sankofa) and a visual symbol (bird looking backward while moving forward — itself a synthesis: backward-looking + forward-moving = learn from past while progressing). This level of lexical and iconographic elaboration indicates exceptionally high burn-in. v3.0 note: Sankofa is the strongest S-dominant case in this dataset; the binary structure (returning + forgotten) is the mechanism, not single-word metaphor."
    confidence: "high"

  - id: "AFR_014"
    tradition: "Ɛbɛ — Akan proverb"
    language: "Twi (Akan)"
    host_word: "Owuo atwedɛɛ, baako foɔ mforo"
    host_romanized: "Owuo atwedee baako foo mforo"
    covert_target: "social leveling critique: even kings and the powerful cannot escape death; implicit challenge to hierarchical authority"
    # x_type: 0.5  # v2.0 original
    x_r: 0.3
    x_e: 0.2
    x_s: 0.5
    x_rationale: "S-dominant hybrid: 'Death's ladder' (A) + 'nobody climbs it alone' (B: social leveling claim) generates the third concept (universal mortality as social equalizer / political critique) that neither element alone carries. R-component: the social critique retreats into mortality universalism. E-component minimal — the meaning emerges from structure rather than active invention."
    recode_note: "x_type=0.5 → (r=0.3, e=0.2, s=0.5). S elevated to 0.5: 'ladder' + 'alone' binary generates social leveling thesis not present in either element. The Structural+Conceptual y_vector supports this S interpretation."
    y_vector: "Structural+Conceptual"
    y_detail: "Structural: the ladder's rungs represent sequential steps toward an inevitable end — the structure encodes graduated approach to death. Conceptual: the social hierarchy is mapped onto the ladder by implication; the proverb says the ladder is climbed alone, implying no class can exempt itself."
