    host_romanized: "Izibongo zenkosi"
    covert_target: "vitriolic critique of British colonial rule and the ongoing oppression of Black South Africans"
    # x_type: 0.1  # v2.0 original
    x_r: 0.85
    x_e: 0.1
    x_s: 0.05
    x_rationale: "Pure R dominant: the colonial critique is entirely concealed within the praise form. The surface is elaborate royal honor; the gold is political condemnation. S=0.05 minimal. Formal? flag added: the imbongi's genre-structure (approach → catalog → enumerate colonial obligations → reveal failures) IS the CPG vehicle."
    recode_note: "x_type=0.1 → (r=0.85, e=0.1, s=0.05). Formal? flag added for v3.0: the imbongi performance structure itself may qualify as Formal vector."
    y_vector: "Metonymic"
    y_vector_v3: "Formal?"
    y_detail: "The action-chain of traditional imbongi performance (approach the chief → catalog his greatness → enumerate his obligations → reveal his failures) is deployed to enumerate colonial obligations/failures while appearing to honor. The praise format is contiguous with the critique via the imbongi's social role. Formal?: the entire praise-genre structure (not any specific word) may be the CPG mechanism."
    z_register: 3
    z_rationale: "Performed publicly at the Prince of Wales' 1925 South Africa visit. S.E.K. Mqhayi's poem was performed before a large audience and is now a landmark text in South African literary history."
    source: "Poetry International, 'S.E.K. Mqhayi — South Africa'; Opland, J. 'Xhosa Poets and Poetry' (Google Books); FWLS.org, 'Traditions and Structure of Xhosa Praise Poetry'"
    notes: "Source quote: 'the prince of Wales is praised in the subtlest fashion, but in true imbongi style the poet levels a vitriolic attack on colonial Great Britain.' Academically verified covert-path example. S.E.K. Mqhayi (1875-1945) is considered the father of modern Xhosa literature. v3.0 note: both AFR_008 and AFR_012 flag Formal? — praise-genre structure as CPG vehicle. Karo/Shogun review recommended."
    confidence: "high"
    flag: true

  - id: "AFR_013"
