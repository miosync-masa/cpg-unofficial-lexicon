    x_e: 0.9
    x_s: 0.0
    x_rationale: "E-dominant: the royal-power meaning is actively constructed onto the bull image through sustained conventional use. The animal is not merely compared to the king — it becomes a standard designation within izibongo. Single animal epithet; S=0.0 under strict S三条件 — 条件1 (JUXTAPOSITION) not met. A single epithet has no binary two-element structure; contrast with AFR_010 (compound 'bull without horns') which IS a binary juxtaposition."
    recode_note: "x_type=0.7 → (r=0.1, e=0.8, s=0.1). Single animal epithet — minimal S. Distinguished from AFR_010 (compound 'bull without horns') which has real S component. S三条件適用: 裁定[2] — s=0.1→0.0, e=0.8→0.9: 条件1(JUXTAPOSITION)不成立。単一上皮号には二語並置構造なし。"
    y_vector: "Behavioral+Conceptual"
