    x_e: 0.75
    x_s: 0.2
    x_rationale: "E-dominant hybrid with moderate S: the king-meaning is actively and systematically assigned to the elephant image (E). The phrase 'elephant hidden by leaves of trees' introduces a binary compound (elephant + concealment) that generates the third idea of latent overwhelming presence. S=0.2 for this compound image."
    recode_note: "x_type=0.8 → (r=0.05, e=0.75, s=0.2). S-component added: 'elephant + hidden by leaves' compound generates 'latent overwhelming power' — a third concept not present in either element alone."
    y_vector: "Behavioral+Conceptual"
    y_detail: "Behavioral: elephant's size, memory, and unstoppability map directly to royal dominance. Conceptual: 'elephant hidden by leaves of trees' — the hidden-presence motif assigns a covert dimension (the king's force is present even when unseen). Shaka's izibongo uses this specific image."
    z_register: 3
    z_rationale: "Used as a royal title (uMgungundlovu = 'place of the elephant' = Dingane's royal kraal). The title became a placename, showing the deepest level of lexical burn-in."
