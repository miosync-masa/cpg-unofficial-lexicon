  - id: "AFR_004"
    tradition: "Oríkì — birth-circumstance names (àmútọ̀runwá)"
    language: "Yoruba"
    host_word: "Òjó"
    host_romanized: "Ojo"
    covert_target: "birth with umbilical cord wrapped around the neck — a dangerous, potentially fatal event"
    # x_type: 0.1  # v2.0 original
    x_r: 0.9
    x_e: 0.1
    x_s: 0.0
    x_rationale: "Pure R: the dangerous birth circumstance is almost completely concealed. The associated oríkì praises the child as irresistible to women, energetic, and divinely connected — all positive codings that mask the original peril. Single event encoding; S=0."
    recode_note: "x_type=0.1 → (r=0.9, e=0.1, s=0.0). Single birth-event concealment; no binary juxtaposition."
    y_vector: "Conceptual"
    y_detail: "Abstract remapping: the near-fatal cord event is reconceptualized as a sign of destiny and spiritual connectivity ('brought from heaven'). The danger is transformed into a positive metaphysical marker."
    z_register: 2
    z_rationale: "Invoked at naming ceremony (contextual/ritual) and again when the person's oríkì is chanted in later life. Periodic repetition in ceremonial contexts."
    source: "YorubaLibrary.com, 'Oriki Ojo — Oriki Amuntorunwa'; YorubaName.com entry 'Òjó'; Yoruba Lessons (2022)"
    notes: "The oríkì for Ojo says nothing explicit about the cord — it focuses on the child's supposed attractiveness and restlessness. Only a cultural insider decodes the oríkì's relation to the birth event. Strong example of covert biographical encoding in praise."
    confidence: "high"

  - id: "AFR_005"
    tradition: "Oríkì — tonal homophone (Yoruba tonal language)"
    language: "Yoruba"
    host_word: "AJE (àjẹ̀ / àjé)"
    host_romanized: "Aje"
    covert_target: "àjẹ̀ (àh-JEH, falling tone): witch / dangerous female spiritual power (Iyami)"
    # x_type: 0.35  # v2.0 original
    x_r: 0.3
    x_e: 0.5
    x_s: 0.2
    x_rationale: "Hybrid with S-component: wealth-goddess invocation (E direction) while activating fear-charge of witch-cognate (R direction). The simultaneous double-activation synthesizes a third state — 'fearsome wealth / wealth that commands dread' — that neither reading alone generates. S=0.2 reflects this small but real synthesis."
    recode_note: "x_type=0.35 → (r=0.3, e=0.5, s=0.2). S-component added: tonal double-activation creates fear-respect-for-wealth not present in either reading alone."
    y_vector: "Phonetic"
    y_detail: "Tonal homophone in Yoruba: same orthographic string 'AJE' resolves to two distinct words with opposite valences depending on tonal realization. In oriki performance, the ambiguity is deliberately cultivated — invoking wealth while activating the fear-charge of the witch-cognate."
    z_register: 3
    z_rationale: "Publicly performed in market rituals, praise-singing, and religious ceremony. The tonal ambiguity is explicitly discussed in written sources and is widely known among Yoruba speakers."
    source: "Segilola Salami, 'Oriki Aje: Praise Poetry for the Goddess of Wealth' (segilolasalami.co.uk); YorubaLibrary.com, 'Orisha Aje'"
    notes: "Quote from source: 'When a Yoruba person sees the letters A J E, the first thing that comes to mind is Ah-Jeh, meaning witch. However, A J E can also be pronounced as Ah-Jay.' The oriki exploits this ambiguity — praising wealth while evoking fear-respect via witch-cognate activation."
    confidence: "high"

  - id: "AFR_006"
    tradition: "Oríkì — orisha praise poetry"
    language: "Yoruba"
