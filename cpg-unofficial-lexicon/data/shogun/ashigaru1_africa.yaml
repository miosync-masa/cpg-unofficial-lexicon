    host_romanized: "Ina ninu enu"
    covert_target: "Sango's divine anger; the danger of speaking his true name; the power to destroy with words"
    # x_type: 0.65  # v2.0 original
    x_r: 0.2
    x_e: 0.7
    x_s: 0.1
    x_rationale: "E-leaning hybrid: the meaning of divine wrath/destructive power is actively constructed on the fire image (Enchant direction). Some R-component deflects from stating 'Sango is dangerously wrathful' directly. S=0.1 minimal: the fire-mouth image is a single compound phrase but not a full binary juxtaposition in the CPG-synthesis sense."
    recode_note: "x_type=0.65 → (r=0.2, e=0.7, s=0.1). Minimal S: 'fire' + 'mouth' is a compound image but the synthesis is weak compared to pure binary CPG cases."
    y_vector: "Conceptual+Behavioral"
    y_detail: "Conceptual: fire → uncontrolled destructive energy → divine anger. Behavioral: the god was said to literally breathe fire/smoke from his nostrils, so the behavior grounds the metaphor. Compound vector where physical behavior and abstract analogy reinforce each other."
    z_register: 3
    z_rationale: "Public ritual performance. Oriki for Sango are performed at lightning festivals, in Candomblé/Santería diaspora contexts, and widely documented in academic literature."
    source: "YorubaLibrary.com, 'Orisha Sango'; Segilola Salami, 'Oriki Sango' (segilolasalami.co.uk); Britannica, 'Shango'"
    notes: "The fire-mouth image simultaneously praises the god's power and encodes a warning about dangerous speech near his presence. Source quotes: 'when he spoke, fire came out of his mouth.' The itufu (oil-soaked fiber torch) is explicitly named in the oriki as the ignition device."
    confidence: "high"

  - id: "AFR_007"
    tradition: "Oríkì — divine object symbolism"
    language: "Yoruba"
    host_word: "Oṣé Ṣàngó (double-headed battle axe)"
    host_romanized: "Ose Sango"
    covert_target: "dual divine nature: justice on one side, punishment/destruction on the other; also the god's capacity for both male and female force"
    # x_type: 0.75  # v2.0 original
    x_r: 0.1
    x_e: 0.4
    x_s: 0.5
    x_rationale: "S-dominant: the double axe head IS a binary physical form (head-A + head-B) and it is this binary morphological structure that generates the third theological concept (divine duality: justice ↔ punishment, creation ↔ destruction). Neither head alone carries the dual-nature meaning. This is a morphological synthesis case. E-component: the theological meaning is actively assigned to the physical form."
    recode_note: "x_type=0.75 → (r=0.1, e=0.4, s=0.5). S-component elevated to 0.5: the double-headed binary structure is a morphological synthesis — classic binary juxtaposition generating third concept."
    y_vector: "Morphological+Conceptual"
    y_detail: "Morphological: the two heads of the axe physically instantiate duality. Conceptual: the duality is then mapped to abstract theological concepts (justice ↔ punishment, creation ↔ destruction). The shape serves as the vehicle for the abstract dual reading."
    z_register: 3
    z_rationale: "Widely displayed, widely discussed, reproduced in shrines and orisha iconography across the African diaspora (Candomblé, Santería, Vodou). The dual-headed symbolism is publicly known and academically documented."
    source: "Wikipedia, 'Shango'; Britannica, 'Shango'; BotanicaOnline.net 'Shango: God of Thunder'"
    notes: "The oṣé is Sango's most recognizable symbol. Its duality encodes the god's nature — often described in oriki as both the bringer of lightning (destruction) and the defender of justice. The morphological vehicle is unusually explicit and public."
    confidence: "high"

  - id: "AFR_008"
    tradition: "Oríkì — royal/political praise poetry"
    language: "Yoruba"
    host_word: "Royal oríkì (oriki ìdílé / lineage praise)"
    host_romanized: "oriki idale"
    covert_target: "implicit threat: the actions and failures being enumerated in the praise can shame the king into withdrawal, submission, or historically reported death"
    # x_type: 0.1  # v2.0 original
    x_r: 0.85
    x_e: 0.1
    x_s: 0.05
    x_rationale: "Pure R dominant: the threatening/coercive content retreats entirely into the praise format. The words are structurally eulogy but functionally the same mechanism as blackmail through public enumeration of actions. S=0.05 minimal: the juxtaposition of praise-form with critique-content generates minimal synthesis."
    recode_note: "x_type=0.1 → (r=0.85, e=0.1, s=0.05). Formal? flag added: the FORM of imbongi/oríkì performance (enumerate → reveal → shame) may qualify as Formal vector — the genre structure itself carries the threat mechanism."
    y_vector: "Metonymic"
    y_vector_v3: "Formal?"
    y_detail: "Action-chain metonymy: praise enumeration of the king's deeds → public acknowledgment of his obligations → shame for failures → historically, self-destructive behavior ('drive kings to suicide'). The chain connects speech act to social consequence. Formal? dimension: the praise-genre structure itself (approach → catalog → enumerate obligations → reveal failures) may be the vehicle, not any specific lexical choice."
    z_register: 2
    z_rationale: "Performed in court/ceremonial contexts (semi-public). The specific threatening function depends on the presence of the target — not purely private but not mass-broadcast either."
    source: "Waterman (cited in Wikipedia 'Oríkì'): 'the words that placate gods and drive kings to suicide [are] made more potent by the patterning of timbre, texture, pitch, and rhythm'; Barber, Karin (1991) 'I Could Speak Until Tomorrow' Edinburgh UP"
    notes: "Barber's landmark study documents this mechanism in detail. The 'driving to suicide' quote is well-attested but refers to a structural capacity rather than one specific documented incident. Flag: no single verse recovered for this item. Formal? added for v3.0: the praise-form's structural sequence may qualify as Formal vector (genre-form carrying covert threat)."
    confidence: "medium"
    flag: true

