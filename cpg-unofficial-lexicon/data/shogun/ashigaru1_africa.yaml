  - id: "AFR_010"
    tradition: "Izibongo — Zulu praise poetry (royal)"
    language: "isiZulu"
    host_word: "Inkunzi engenazimpondo (bull without horns / hornless ox)"
    host_romanized: "inkunzi engenazimpondo"
    covert_target: "defeated enemies: militarily castrated, sexually humiliated, stripped of power"
    # x_type: 0.2  # v2.0 original
    x_r: 0.45
    x_e: 0.1
    x_s: 0.45
    x_rationale: "S-significant hybrid: this is a compound epithet — 'bull' (A) + 'hornless/without horns' (B) — and the combination generates a THIRD meaning (castrated/defeated/sexually humiliated enemy) that neither element alone carries. 'Bull' alone is the king; 'hornless' alone is just absence; the compound generates the specific contemptuous meaning. R-component: the humiliation retreats into animal metaphor."
    recode_note: "x_type=0.2 → (r=0.45, e=0.1, s=0.45). Major recode: elevated S to 0.45 — izibongo compound epithet is a binary juxtaposition case generating third meaning. Distinguished from AFR_009 (single bull epithet)."
    y_vector: "Morphological+Behavioral"
    y_detail: "Morphological: the absence of horns (a physical attribute) encodes the absence of fighting capacity. Behavioral: a hornless bull cannot compete for dominance — the behavioral incapacity maps to military/sexual defeat."
    z_register: 3
    z_rationale: "Public performance — enemies are humiliated before audiences at royal gatherings and during battle preparations."
    source: "OpenBook Publishers, 'ch5', analysis of Shaka izibongo; Stuart/Cope (1968) 'Izibongo: Zulu Praise-Poems'"
    notes: "Source quotes: 'compared, for instance, to a small and despicable ox, or to a bull without horns fighting against a conquering and triumphant bull.' The contrast bull (king) vs. hornless ox (enemy) encodes the victory narrative with layered sexual/military meaning. Key v3.0 note: compound epithet structure is S-dominant mechanism."
    confidence: "high"

  - id: "AFR_011"
