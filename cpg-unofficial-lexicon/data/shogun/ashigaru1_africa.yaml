  - id: "AFR_001"
    tradition: "Qene (Sem-ena-Werq)"
    language: "Amharic / Ge'ez"
    host_word: "መስቀል"
    host_romanized: "Meskel"
    covert_target: "to hang with a rope (execution / political killing)"
    # x_type: 0.1  # v2.0 original
    x_r: 0.9
    x_e: 0.1
    x_s: 0.0
    x_rationale: "Pure R-direction: the dangerous political meaning (execution) retreats into the sacred, innocuous word for the priestly cross. Safety through sacred homonymy. No binary juxtaposition; S=0."
    recode_note: "x_type=0.1 → (r=0.9, e=0.1, s=0.0). Phonetic homonymy is a single-word mechanism with no synthesis component."
    y_vector: "Phonetic"
    y_detail: "Same phoneme string 'Meskel' carries two denotations (cross ↔ hanging) without any stress shift — the ambiguity is entirely phonological/lexical. The polysemy is exploited to layer a covert political reading onto a surface religious image."
    z_register: 3
    z_rationale: "Public political performance poetry, widely reported and cited in multiple academic analyses. The Ian Smith poem became a widely known example of qene as political critique."
    source: "Wikipedia, 'Qene'; GE Gorfu, 'Introduction to Qene', meskot.com; Britannica, 'Ethiopian literature'"
    notes: "Documented specific poem: an Ethiopian cleric composed this qene about Ian Smith — surface reading praises the blessing cross priests carry; gold reading reveals 'his cross/his hanging' for Black people. Canonical example of qene's political protective function."
    confidence: "high"

