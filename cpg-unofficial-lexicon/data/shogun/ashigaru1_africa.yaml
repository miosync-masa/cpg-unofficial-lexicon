  key_findings: |
    1. S-DOMINANT SUBSET (v3.0 NEW FINDING): The ternary coordinate conversion reveals a previously hidden
    S-dominant subset in African CPG data. Four items emerge as S-dominant (s >= 0.4): the double-headed
    Sango axe (binary morphological synthesis), the izibongo compound epithet 'bull without horns' (A+B →
    third concept of defeat), the Sankofa proverb (returning + forgotten → cultural recovery mandate), and
    the Owuo Atwedee proverb (ladder + alone → social leveling). These items were previously miscoded as
    R-leaning or E-leaning because the binary juxtaposition mechanism was not separately tracked. The Sankofa
    proverb (s=0.7) is the strongest S-case in this dataset — structurally comparable to Nahuatl difrasismo
    or Old Norse kenning compounding.

    2. FORMAL VECTOR OPEN QUESTION (v3.0): Two items (AFR_008, AFR_012) may qualify for Formal vector
    designation — not because of ring composition (Celtic dúnad-style) but because the praise-genre
    PERFORMANCE STRUCTURE itself carries the covert threat/critique mechanism. The imbongi's formal duty
    to enumerate royal obligations creates the threat; the praise-genre's sequential structure (approach →
    catalog → reveal failures) is the vehicle. Whether this constitutes Formal vector (compositional form
    as CPG carrier) or remains Metonymic (action-chain: praise → shame → consequence) is a judgment call
    requiring CPG framework review. Flagged for Karo/Shogun decision.

    3. STRONG R-BIAS IN PROTECTIVE FUNCTIONS (v2.0 finding confirmed): African CPG traditions show a
    pronounced R-direction (meaning→word) when the covert path serves a protective function — political
    critique hidden under religious language (qene), insults hidden under praise (izibongo), and taboo
    events hidden under euphemism (Akan death language). This suggests that the "refuge" mechanism is
    culturally institutionalized rather than ad-hoc: Ethiopia has a named genre (sem-ena-werq) explicitly
    designed for political protection through ambiguity. 7 of 15 items are R-dominant (r >= 0.6).

    4. METONYMIC + BEHAVIORAL VECTORS DOMINATE: Unlike East Asian CPG traditions (which heavily favor
    Phonetic and Morphological vectors — puns, homophony, visual resemblance), African traditions
    surveyed here predominantly use Metonymic (action-chain) and Behavioral (organism behavior) vectors.
    The praise-poetry traditions (oríkì, izibongo) activate covert paths through the behavior of animals
    (bull charging, elephant moving) and through action chains embedded in social performance. This may
    reflect an oral performance culture where temporal unfolding (behavior, action) rather than spatial
    form or sound serves as the primary CPG vehicle.

    5a. S三条件再検査結果 (裁定[2] — subtask_005a): 全15件を三条件(JUXTAPOSITION/NON-COMPOSITIONALITY/
    CULTURAL CONVENTION)で再検査。新規S未コーディング項目: 0件。訂正: AFR_009 (inkunzi/bull単一上皮号)
    のs=0.1を0.0に修正 — 条件1(JUXTAPOSITION)不成立。単一上皮号には二語並置構造がない。AFR_010との
    対比が明確化: AFR_009(inkunzi単独→王)はE方向のみ; AFR_010(inkunzi+engenazimpondo→敗北)は
    S方向あり。確認: AFR_013(Sankofa)は三条件を完全に満たす最強S事例(s=0.7)。
    AFR_010(izibongo複合上皮号)も三条件完全充足(s=0.45)。s_nonzero_count: 10→9に更新。

    5. REGISTER BURN-IN IS EXCEPTIONALLY HIGH: 11 of 15 items are Z=3 (third-party report / public
    performance). African praise poetry traditions are designed for public performance before large
    audiences — the imbongi, the oríkì-chanter — which produces extremely high Z values. This is
    unusual compared to more private CPG traditions and suggests rapid lexical burn-in: the covert
    paths in izibongo and oríkì have been repeated in public so many times that the 'ndlovu = king'
    association has become sedimented into a placename (uMgungundlovu). This is perhaps the strongest
    evidence of CPG achieving full lexical leakage in this dataset.

