    x_r: 0.00
    x_e: 0.65
    x_s: 0.35
    x_rationale: |
      Triangular coordinate (v3.0): E-dominant. The physical landscape is actively assigned
      spiritual-narrative meaning; inversely, the narrative encodes geographic information.
      S=0.35: the juxtaposition of geographic sequence + ancestral story generates a
      third meaning system — practical navigation law + spiritual law + kinship law —
      that emerges from the pairing and cannot be reduced to either element alone.
    y_vector: "Formal+Conceptual"
    y_detail: |
      Formal (v3.0 addition): the sequential order of the performance IS the covert path.
      Each verse's position in the inma sequence corresponds to a specific geographic
      position along the route — the form/structure of the ceremony encodes the map.
      Singing the song in order IS traversing the route; reordering verses would produce
      geographic gibberish. The form carries the content in a way no single verse can.
      Conceptual: ancestor's mythical journey is an analogy for seasonal migration and
      resource management patterns.
    z_register: 2
    z_rationale: "Performed in seasonal/ceremonial contexts. Public version is open; inner sacred layer (tjukurpa restricted) is dyadic (Z=1). Assigned Z=2 for the accessible ceremonial register."
    source: "Wikipedia 'Songline'; ANU Press 'Long History, Deep Time' ch.2; PACJA 'Contributions from Aboriginal Australian Psychology: Songlines, Memory, and Relational Knowledge Systems'"
    notes: "One of the most structurally complex CPG systems found: the covert path is bidirectional (geography→narrative AND narrative→geography). The dual-layer (public/restricted) creates a nested CPG system unique among surveyed traditions."
    confidence: "high"
    recode_note: |
