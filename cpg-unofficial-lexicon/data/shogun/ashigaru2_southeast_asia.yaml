    confidence: "medium"
    recode_note: "v3.0: Added Formal vector — pantun structure enables taboo retreat into domestic imagery. X converted: 0.2→(r=0.70,e=0.10,s=0.20); S moderate (pantun structural juxtaposition) but lower than other pantun items due to strong R-dominance."

  - id: "SEA_006"
    tradition: "Vietnamese Nôm poetry (Ho Xuan Huong)"
    language: "Vietnamese"
    host_word: "quả mít trên cành (jackfruit on the branch)"
    host_romanized: "quả mít trên cành"
    covert_target: "female body; sexual invitation"
    x_type: 0.15  # legacy v2.0
    x_r: 0.85
    x_e: 0.15
    x_s: 0.00
    x_rationale: "R-direction (strong): Under Confucian social norms, direct expression of female sexuality was completely forbidden; the entire poem operates as an innocent surface that conceals an unmistakable sexual meaning — maximum taboo-avoidance pressure. No S-component: this is a Nôm poem (not pantun); the covert path operates through morphological-conceptual mapping rather than structural juxtaposition of two formal elements that synthesize a third meaning."
    y_vector: "Conceptual+Morphological"
    y_detail: "The jackfruit's physical properties are mapped onto the female body: coarse outer skin = woman's rough outer appearance; thick inner flesh = bodily substance; sticky milky sap = bodily secretion. The act of impaling the fruit on a stick to ripen it = sexual penetration. The 'ripening' process = sexual response. All mappings operate through physical/morphological resemblance plus extended conceptual analogy."
    z_register: 3
    z_rationale: "One of Ho Xuan Huong's most famous poems; widely anthologized; discussed in academic scholarship on Vietnamese literature; taught in Vietnamese schools"
    source: "Poetry Foundation: 'Translator's Note: Jackfruit by Ho Xuan Huong' (poetryfoundation.org/poetrymagazine/articles/145681); Balaban, J. (2000) 'Spring Essence: The Poetry of Ho Xuan Huong', Copper Canyon Press"
    notes: "Represents the 'thanh/tuc' (pure/obscene) dual-register system unique to Ho Xuan Huong's oeuvre. The surface reading (fruit cultivation) is entirely plausible and innocent. Vietnamese scholars note that 'it is impossible to read this poem without seeing the clear reference to the sexual act.' The covert path has zero ambiguity for Vietnamese speakers — maximum leakage despite formal innocence of surface text."
    confidence: "high"
    recode_note: "v3.0: No Formal vector — Nôm poem operates via morphological/conceptual mapping, not structural form. No S-component — covert path is pure R retreat, no two-element synthesis generating third meaning. X converted: 0.15→(r=0.85,e=0.15,s=0.00)."

