    x_type: 0.75  # legacy v2.0
    x_r: 0.05
    x_e: 0.60
    x_s: 0.35
    x_rationale: "E-direction: the plant's physical/structural property is actively chosen to construct the meaning of unstable love (deliberate rhetorical invention). S-component (0.35): pantun's pembayang/isi juxtaposition creates a third meaning — 'love IS a rootless floating thing' emerges from placing the botanical image in pembayang against the emotional revelation in isi. Trace R (0.05): minor avoidance of declaring love's instability directly."
    y_vector: "Structural+Formal"
    y_detail: "The water hyacinth floats on the water's surface without anchoring in soil. This structural property — floating, rootless, carried by currents — is mapped onto a love relationship that cannot establish itself or take root in a person's heart. The image encodes both the beauty of the love (it is still a flower) and its fragility. FORMAL: The pantun 2+2 structure places the botanical image in pembayang (hint) and the romantic meaning in isi (message) — the formal architectural division IS the mechanism by which the structural metaphor is transmitted. Arguably the clearest example of Structural+Formal co-occurrence in this dataset."
    z_register: 3
    z_rationale: "Cited in multiple scholarly sources as a traditional pantun symbol; widely understood by Malay speakers familiar with pantun tradition"
    source: "Wikipedia: Pantun — 'the water hyacinth (bunga kiambang) meaning love that will not take root'; Malay Heritage Foundation"
    notes: "Structurally precise CPG example — the physical property of the host object directly generates the covert meaning without relying on phonetic similarity or cultural convention. The Structural vector operates with particular clarity here."
