    host_romanized: "tupai"
    covert_target: "seducer; unfaithful/fickle person"
    x_type: 0.8  # legacy v2.0
    x_r: 0.00
    x_e: 0.70
    x_s: 0.30
    x_rationale: "E-direction: the squirrel's behavioral characteristics are actively mapped onto human behavior to construct the social type of the seducer (rhetorical invention, not taboo-avoidance). S-component (0.30): pantun's pembayang/isi two-layer juxtaposition creates a third meaning — 'the seducer is a pest like the squirrel' emerges from the formal structural synthesis. No R-component: no taboo-avoidance driving the choice."
    y_vector: "Behavioral+Formal"
    y_detail: "The squirrel is known for darting quickly between trees, nibbling at fruit before moving on without committing. These behavioral traits (agility, opportunism, multiple targets, never settling) are mapped onto the human seducer who approaches multiple romantic targets without sincere commitment. FORMAL: The pantun structure places the squirrel image in pembayang and the social judgment in isi — the formal two-couplet architecture is the mechanism by which the covert meaning of 'seducer-as-pest' is transmitted without direct accusation."
    z_register: 3
    z_rationale: "Documented in multiple pantun scholarship sources as a standard symbol; widely recognized in Malay literary culture"
    source: "Wikipedia: Pantun — 'the squirrel (tupai) meaning a seducer'; Bartosh (2023) 'Malay folk genre pantun: traditions and modernity', RUDN Journal"
    notes: "The tupai metaphor encodes a moral judgment (the seducer as a pest) within an apparently neutral nature image. Contrasts with the bunga/kumbang pair: the kumbang (bee) represents the sincere suitor, while the tupai represents the dangerous seducer."
    confidence: "high"
    recode_note: "v3.0: Added Formal vector — pantun architectural structure carries moral covert path. X converted per task example: 0.8→(r=0.00,e=0.70,s=0.30); S assigned for pembayang/isi synthesis."

