  - id: "SEA_005"
    tradition: "Malay pantun"
    language: "Malay"
    host_word: "kain (كاين — cloth / blanket)"
    host_romanized: "kain"
    covert_target: "sexual/emotional longing for a partner; intimate physical need"
    x_type: 0.2  # legacy v2.0
    x_r: 0.70
    x_e: 0.10
    x_s: 0.20
    x_rationale: "R-direction dominant: strong taboo pressure (Malay cultural norms prohibiting direct expression of sexual emotion) causes the feeling to retreat into a mundane domestic object — the missing blanket. S-component (0.20): pantun's pembayang/isi two-layer structure creates a synthesis — the image of the missing blanket (pembayang) juxtaposed with the emotional void (isi) generates the third meaning of sexual absence as felt, physical deprivation. Small E (0.10): some intentional choice of this particular domestic object."
    y_vector: "Metonymic+Formal"
    y_detail: "The blanket/cloth that covers and warms the body functions metonymically for intimacy and the physical presence of a partner. The complaint 'my blanket is missing' = the absent lover who would provide bodily warmth and intimacy. The action-chain of covering/warming metonymically leads to sexual intimacy. FORMAL: The pantun 2+2 structure places the domestic complaint image in pembayang and reveals the emotional/sexual longing in isi — the formal architectural separation allows the taboo content to remain deniably housed in the mundane image."
    z_register: 1
    z_rationale: "Used in private/intimate pantun exchanges between lovers; not a publicly standardized symbol in the same way as bunga/kumbang — dyadic and personal"
    source: "Pantun: an elegant way to communicate (digital.whatsup.sg/2021/05); Ruminations: A Conversation on the Malay Pantun (fazu.typepad.com)"
    notes: "Source directly states: 'the complaint about the missing blanket can be an expression of emotional desperation and sexual anguish, and in a society in which strong emotions and sexual issues are rarely spoken of directly and openly, the pantun works as an efficient vehicle to express oneself.' Specific pantun text not directly quoted in sources consulted."
