    x_r: 0.75
    x_e: 0.10
    x_s: 0.15
    x_rationale: "R-direction dominant: erotic bodily meaning retreats entirely into the geographic landscape under Confucian censorship. S-component (0.15): Vietnamese tonal homophony creates a synthesis — the same written syllable 'đèo' exists at the intersection of two semantic frames (geographic / anatomical); the tonal compound pair generates a third 'hovering' meaning that is neither purely the mountain pass nor purely the anatomy but both simultaneously. Small E (0.10): deliberate deployment of this technique."
    y_vector: "Phonetic+Conceptual"
    y_detail: "The word 'đèo' with falling tone (dipping contour) = mountain pass, but Vietnamese tonal phonology allows a near-homophone in a different register that activates a crude anatomical term. The 'three peaks/mountains' adds a numerical/visual conceptual layer. The journey through the pass is conceptually mapped to sexual access. Vietnamese tonal homophony (6 tones per syllable) enables this dual reading without changing the written form."
    z_register: 3
    z_rationale: "Famous poem widely discussed in scholarship on Ho Xuan Huong; the tonal pun is explicitly noted by multiple translators and scholars"
    source: "CATranslation.org essay 'Dressing Up in Her Poems' (catranslation.org); Humanities Moments 'Three Mountain Pass' (humanitiesmoments.org); Chao Hanoi blog (chaohanoi.com)"
    notes: "Demonstrates a uniquely Vietnamese CPG mechanism: tonal homophony enables dual reading of the same written syllable depending on which tone the reader mentally applies. The poem is 'much naughtier; much more acid in its reference to gentlemen (quan tu)' — the lordly travelers through the pass become unwitting participants in the erotic landscape. Medium confidence due to complexity of tonal analysis in translation."
    confidence: "medium"
    recode_note: "v3.0: No Formal vector — mechanism is tonal phonology, not formal poem structure. S-component (0.15) added: tonal compound pair creates synthesized dual-semantic reading (geographic + anatomical meanings hover simultaneously — a third hovering state). X converted: 0.15→(r=0.75,e=0.10,s=0.15). Vietnamese tonal compound pairs identified as S候補 in task spec."

  - id: "SEA_008"
