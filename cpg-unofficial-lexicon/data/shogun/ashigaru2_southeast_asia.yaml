    host_romanized: "miếng trầu; trầu cau"
    covert_target: "conjugal love; marriage proposal; romantic/sexual union"
    x_type: 0.6  # legacy v2.0
    x_r: 0.20
    x_e: 0.45
    x_s: 0.35
    x_rationale: "Hybrid: E dominant (myth of origin actively assigns the meaning), R secondary (avoidance of direct romantic declaration in Vietnamese cultural norms). S-component (0.35): the three-element compound (betel leaf + areca nut + limestone) synthesizes a third meaning — the reunion of three separated people (wife + husband + brother transformed into the three elements) creates 'conjugal love' as a synthesized emergent meaning from the material combination. This is distinctly S-type: no single element carries the meaning; the combination does."
    y_vector: "Conceptual"
    y_detail: "Derives from the legend 'Sự tích trầu cau' (Legend of Betel and Areca) where a wife, her husband, and his brother are transformed into the betel plant, areca palm, and limestone respectively. The combination of all three elements in the chewed quid = reunion of separated lovers = conjugal love. The proverb 'miếng trầu là đầu câu chuyện' (betel is the beginning of every conversation) encodes the idea that offering betel = initiating a romantic/social connection."
    z_register: 3
    z_rationale: "Proverbial transmission; essential element of Vietnamese marriage ceremonies (lễ ăn hỏi engagement ceremony); taught in school; widely quoted in ca dao collections"
    source: "Vietnamese Language Centre Singapore (vietnameselanguage.wordpress.com); Vietnam Tour (vietnam-tour.biz/vietnamese-custom-betel-chewing/); Balaban, J. 'Ca Dao Viet Nam' (Copper Canyon Press / Internet Archive)"
    notes: "The phrase 'chuyện trầu cau' (betel-and-areca matters) = a widely recognized code for courtship/romantic affairs in Vietnamese culture. The betel quid operates as a material covert message: offering betel to someone = implicit romantic/social proposal. Z=3 because this code is openly transmitted across generations through ceremony and proverb."
    confidence: "high"
    recode_note: "v3.0: No Formal vector — ca dao does not use pantun-equivalent structural form. S-component (0.35) added: three-element material compound (betel+areca+lime) generates third meaning 'conjugal union' through synthesis of components — each element alone is insufficient. This is a material S (物質的合成) rather than structural S. X converted: 0.6→(r=0.20,e=0.45,s=0.35)."

  - id: "SEA_009"
    tradition: "Javanese tembang macapat"
    language: "Javanese"
    host_word: "sasmitaning tembang (ꦱꦱ꧀ꦩꦶꦠꦤꦶꦁ ꦠꦼꦩ꧀ꦧꦁ — indicator/signal word embedded in verse)"
    host_romanized: "sasmita / sasmitaning tembang"
    covert_target: "identity of the next melody/meter the performer must switch to"
    x_type: 0.9  # legacy v2.0
    x_r: 0.00
    x_e: 0.70
    x_s: 0.30
    x_rationale: "E-direction (strong): the sasmita indicator meaning is actively constructed by the poet and assigned to an existing word — new covert function invented and embedded. S-component (0.30): the sasmita operates as a synthesis between the word's ordinary semantic meaning and its phonetic echo of the meter name; these two elements are juxtaposed within the same word to generate the third meaning (navigational signal). No R: no taboo-avoidance; the purpose is navigational-creative."
    y_vector: "Structural+Phonetic+Formal"
    y_detail: "The sasmita word is chosen because its syllables echo the name of the next tembang meter (e.g., a word containing 'kambang' signals the transition to Maskumambang meter). The covert path operates phonetically (sound similarity to meter name) and structurally (placement in the final gatra/line of a canto signals transition). The concept of 'tanggap sasmita' (the skill of catching the hidden signal) is itself a Javanese cultural value. FORMAL: The sasmita system IS Formal vector by definition — the embedded signal targets the next poetic form, and the sasmita word's position within the formal structure (final gatra) is what activates its navigational function. The form of the poem carries information about another form."
    z_register: 2
    z_rationale: "Known to macapat performers, literary specialists, and those trained in Javanese classical arts; not decoded by general uninitiated audiences; transmitted in specific educational/ceremonial contexts"
    source: "Suwanto & Winarni, 'Sasmita Tembang Macapat (Suatu Kajian Pragmatik)' (Semantic Scholar, semanticscholar.org); dwijagumilar.blogspot.com/2020 'Sasmitaning Tembang Macapat'; gladijawa.blogspot.com 'Sasmitane Tembang'"
    notes: "Unique CPG subtype: the covert path functions as a structural/navigational code within a performance tradition rather than as a social/emotional euphemism. Performers who cannot 'catch the sasmita' are considered insufficiently skilled. The system creates a layered text visible to the initiated but invisible to casual listeners — strong in-group/out-group register distinction."
    confidence: "high"
    recode_note: "v3.0: Added Formal vector — sasmita embeds the next poetic form (meter identity) within the current form; the poem's formal structure transmits information about another form. S-component (0.30): word meaning + phonetic meter echo synthesize the navigational signal as third meaning. X converted: 0.9→(r=0.00,e=0.70,s=0.30). Formal vector is definitionally correct here — identified as 'Formal候補' in task spec."

  - id: "SEA_010"
    tradition: "Javanese tembang macapat"
    language: "Javanese"
    host_word: "Maskumambang (ꦩꦱ꧀ꦏꦸꦩꦩ꧀ꦧꦁ — meter/song name: mas=gold + kumambang=floating)"
    host_romanized: "Maskumambang"
    covert_target: "human fetus floating in amniotic fluid; the beginning of human life"
    x_type: 0.85  # legacy v2.0
    x_r: 0.00
    x_e: 0.65
    x_s: 0.35
    x_rationale: "E-direction (strong): the meter name was constructed by Javanese literary culture to encode the fetal stage of human existence — purposeful semantic invention. S-component (0.35): the compound word 'mas' (gold/precious) + 'kumambang' (floating) synthesizes a third meaning — neither word alone creates the fetal image; the juxtaposition of 'precious' and 'floating-in-liquid' yields 'fetus' as emergent synthesis. Additionally, the macapat meter system collectively encodes 11 life stages — the FORM of each meter IS the covert carrier."
    y_vector: "Conceptual+Morphological+Formal"
    y_detail: "'Mas' (gold) = precious, invaluable — the unborn child as the most precious thing; 'kumambang' = floating, drifting in liquid. The compound constructs the image of a precious being suspended in fluid = fetus in amniotic sac. The macapat cycle encodes the entire human life journey: Maskumambang (fetus) → Mijil (birth) → Sinom (youth) → Asmarandana (romance) → Kinanthi (companionship) → ... → Megatruh (death) → Pucung (burial). FORMAL: The macapat METER SYSTEM as a whole constitutes a Formal vector — the 11 musical forms encode 11 life stages; knowing which meter is being performed = knowing which life stage is being addressed. The musical form itself transmits the life-stage meaning. This is the most architecturally complete Formal vector system found in Southeast Asian poetry."
    z_register: 2
    z_rationale: "Transmitted in traditional Javanese ceremonial and educational contexts; requires specific knowledge of the macapat system to decode; not everyday public knowledge"
    source: "Conscientia (jurnal-stbalia-yk.ac.id) 'Kinds and Meaning of Tembang Macapat for Javanese People'; Atlantis Press (atlantis-press.com/proceedings/icomsi-24) 'Tembang Macapat Maskumambang Cultural Heritage'"
    notes: "The macapat life-cycle symbolism represents the most architecturally comprehensive CPG system found in Southeast Asian poetry — 11 meters encode 11 life stages in a complete ontological map. Each meter name is a covert label for a life phase, activated only when the full system is known. Arguably unique in world poetry for its systematic scope."
    confidence: "high"
    recode_note: "v3.0: Added Formal vector — macapat meter system encodes life stages through musical form; the form IS the covert carrier. S-component (0.35): compound word 'mas+kumambang' synthesizes 'precious-floating' → fetal image as emergent third meaning. X converted: 0.85→(r=0.00,e=0.65,s=0.35). Task spec identified macapat as 'Formal+Structural?' — resolved as Formal+Conceptual+Morphological given name-compound synthesis."

