    Southeast Asia presents exceptional diversity in CPG mechanisms, with several distinctive patterns
    not prominently observed in other world regions:

    1. TONAL PHONOLOGY AS CPG ENGINE (Vietnamese): Ho Xuan Huong's Nôm poetry exploits Vietnamese
    tonal phonology — 6 tones per syllable — to create dual readings from a single written text.
    The same grapheme activates different semantic frames depending on which tone the reader mentally
    applies. This is a phonetic CPG mechanism unique to tonal languages and represents an unusually
    precise instrument for covert path construction. The "thanh/tuc" (pure/obscene) dual-register
    system institutionalizes this technique at the literary level.

    2. STRUCTURAL PROPERTY MAPPING (Malay pantun, Javanese macapat): Southeast Asian traditions
    make heavy use of Structural vector CPG — mapping the physical structure or property of an
    object (a floating plant, a macapat meter name) onto abstract concepts (rootless love, a life
    stage). This is particularly elegant in pantun, where the pembayang (hint couplet) is
    architecturally designed to carry the structural metaphor. The Javanese sasmita system
    (SEA_009) represents a unique case where the covert path serves a NAVIGATIONAL function
    within a performance tradition — the hidden meaning is a cue for performers, not a social
    communication.

    3. HIGH Z-REGISTER DOMINANCE: 11 of 15 items scored Z=3 (public/third-party transmission).
    Southeast Asian CPG traditions are predominantly public — transmitted through widely performed
    folk songs, school curricula, ceremonies, and viral pop music rather than private in-group use.
    This contrasts with what might be expected from the high degree of cultural indirectness (Malay
    cakap beralas, Vietnamese politeness norms). The covert meanings are "open secrets" widely
    understood by cultural insiders even when the surface text is deniable.

    4. MACAPAT LIFE-CYCLE SYSTEM (Javanese): The macapat meter sequence (Maskumambang through
    Pucung) represents the most architecturally complete CPG system found in Southeast Asia — 11
    meters encoding 11 life stages in a systematic ontological map. This is a collectively
    maintained covert code where the surface form (musical meter names) systematically indexes
    an entire philosophy of human existence. No parallel system of this scope was found in other
    regional traditions during this survey.

    5. FORMAL VECTOR PREVALENCE (v3.0 finding): 9 of 15 SE Asian items exhibit the Formal vector —
    the highest proportion expected among world regions. Southeast Asian poetic traditions are
    uniquely characterized by architecturally fixed forms (pantun 2+2 structure, macapat meter
    cycle, phleng choi call-and-response) that are themselves the covert path carriers. The form
    is not a neutral container for the covert content — the form IS the mechanism.

    6. S-COMPONENT (SYNTHESIS) DISTRIBUTION (v3.0 finding): 14 of 15 items exhibit non-zero S
    component. Southeast Asian CPG is strongly synthesis-oriented: two-element juxtaposition
    (pantun pembayang/isi, Vietnamese tonal compound pairs, macapat compound meter names,
    phleng choi call-and-response dynamics) frequently generates emergent "third meanings" that
    neither element alone could produce. Only SEA_006 (Ho Xuan Huong jackfruit poem) shows
