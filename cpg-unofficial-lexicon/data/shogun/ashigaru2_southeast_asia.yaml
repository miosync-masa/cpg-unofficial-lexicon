  - id: "SEA_001"
    tradition: "Malay pantun"
    language: "Malay"
    host_word: "selasih (سلاسيه — sweet basil plant)"
    host_romanized: "selasih"
    covert_target: "kekasih (beloved/sweetheart)"
    x_type: 0.4  # legacy v2.0
    x_r: 0.45
    x_e: 0.25
    x_s: 0.30
    x_rationale: "R-direction dominant: the poet's unexpressed feeling retreats into the plant name via phonetic rhyme, avoiding direct emotional declaration (Malay cakap beralas). S-component (0.30): pantun's pembayang/isi two-couplet juxtaposition generates a third meaning — the sound overlap selasih/kekasih exists as a synthesized resonance between the two structural layers. Small E (0.25): deliberate choice of this plant among alternatives."
    y_vector: "Phonetic+Formal"
    y_detail: "'Selasih' (sweet basil) is placed in the pembayang (imagery couplet) because it rhymes with 'kekasih' (beloved) in the isi (message couplet). Classic pantun example: 'Tanam selasih di tengah padang / sudah bertangkai diurung semut / Kita kasih orang tak sayang / Halai-balai tempurung hanyut' — I loved but am not loved. The sound overlap selasih/kekasih activates the hidden emotional content. FORMAL: The pantun's fixed 2+2 line structure (pembayang = hint, isi = message) is the architectural carrier of the covert path — without the formal separation, the phonetic link cannot operate."
    z_register: 3
    z_rationale: "Standard pantun symbol, widely known by Malay speakers; cited in multiple scholarly sources on pantun structure"
    source: "Wikipedia: Pantun (en.wikipedia.org/wiki/Pantun); Malay Heritage Foundation (mhf.org.sg/poetry/); Bartosh (2023) 'Malay folk genre pantun: traditions and modernity', RUDN Journal"
    notes: "Paradigmatic example of pantun's phonological covert path. The selasih/kekasih rhyme is foundational to understanding how pembayang functions as a hint (pembayang = 'hint') to the isi's emotional message."
    confidence: "high"
    recode_note: "v3.0: Added Formal vector — pantun 2+2 structure is architectural carrier. X converted: 0.4→(r=0.45,e=0.25,s=0.30); S assigned for pembayang/isi juxtaposition creating phonetic synthesis."

  - id: "SEA_002"
    tradition: "Malay pantun"
    language: "Malay"
    host_word: "bunga dan kumbang (بوڠا دان کومباڠ — flower and bee)"
    host_romanized: "bunga dan kumbang"
    covert_target: "maiden and her suitor; courtship relationship"
    x_type: 0.7  # legacy v2.0
    x_r: 0.10
    x_e: 0.55
    x_s: 0.35
    x_rationale: "E-direction dominant: Malay poets actively chose the bee-and-flower image to construct and transmit the courtship meaning (rhetorical invention). S-component (0.35): pantun's pembayang/isi juxtaposition creates a third meaning — 'courtship IS pollination dance' emerges only when the bee-flower pembayang and the human isi are placed in structural opposition. R-minor (0.10): some avoidance of direct courtship declaration."
    y_vector: "Conceptual+Behavioral+Formal"
    y_detail: "The bee's active, purposeful behavior toward flowers (attraction, approach, pollination) is mapped conceptually onto male courtship. The flower's passive, beautiful, stationary nature maps onto the female object of courtship. The bee visits multiple flowers (potential infidelity). Multiple actions in the bee-flower relationship encode stages of courtship. FORMAL: The pantun 2+2 structure places the bee-flower world in pembayang and reveals the human courtship in isi — the formal separation between these two couplets is essential to the covert path; the 'third meaning' (courtship = pollination) emerges from their juxtaposition."
    z_register: 3
    z_rationale: "One of the most widely attested symbolic pairs in pantun tradition; documented in multiple scholarly sources as standard pantun symbol; widely understood by Malay speakers"
    source: "Wikipedia: Pantun — 'the flower and the bee meaning the girl and her lover'; Malay Heritage Foundation; Muhammad Haji Salleh (2018) 'Pantun: The poetry of passion', University of Malaya Press"
    notes: "Analogous to bee/flower courtship symbolism in Persian ghazal and Arabic poetry, suggesting a possible shared literary influence or cross-cultural convergence. One of the most frequent natural symbols in pantun."
    confidence: "high"
    recode_note: "v3.0: Added Formal vector — pantun structural separation enables covert path. X converted: 0.7→(r=0.10,e=0.55,s=0.35); S assigned for pembayang/isi synthesis generating 'courtship IS pollination' third meaning."

  - id: "SEA_003"
