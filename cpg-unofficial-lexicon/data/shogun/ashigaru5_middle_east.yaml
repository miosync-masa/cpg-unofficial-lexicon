  - id: "MET_010"
    tradition: "kinaya"
    language: "Arabic"
    host_word: "يَدُ اللَّه"
    host_romanized: "yad Allāh"
    covert_target: "God's power, agency, and beneficence (not a literal hand)"
    x_type: [0.50, 0.45, 0.05]  # (r, e, s): hybrid — theologically driven R (avoiding anthropomorphism) + active encoding of divine power (E); bilā kayf maintains both
    x_rationale: "v3.0: The 'Hand of God' expression has dual motivation. R component (r=0.50): avoids direct theological description of divine nature; the literal hand meaning is theologically problematic (anthropomorphism) so meaning retreats into the hand-metaphor. E component (e=0.45): actively encodes divine power/agency through the hand-as-agent schema. The bilā kayf doctrine ('without asking how') institutionally freezes this hybrid state — neither R nor E collapses. No S. Classified as hybrid unlike non-divine kinaya (which are R-dominant) because the theological dimension creates an active E component absent in mundane kinaya."
    y_vector: "Conceptual+Formal"
    y_detail: "Hand is the prototypical human agent of action and giving. By mapping 'hand' onto divine agency, the kinaya uses the human-action schema to encode God's causative power without committing to a literal body part. FORMAL vector: the bilā kayf ('without asking how') theological doctrine is a formal/institutional structure that maintains the ambiguity — the doctrinal prohibition against resolving the covert path constitutes a formal CPG-stabilization mechanism unique to Abrahamic sacred kinaya."
    z_register: 3
    z_rationale: "Found in the Quran (48:10: 'God's hand is above their hands'; 3:73) and hadith literature; universally recited and analyzed across 14 centuries of Islamic scholarship."
    source: "Quran 48:10; ISSA Proceedings 2002 'Kinâya'; Kināyah as a figure of speech in the Qur'an (White Rose e-thesis, University of Leeds, 2019); Al-Islam.org"
    notes: "Theologically unique CPG case: the kinaya is contested — medieval Islamic theologians (Mutazilites vs. Ash'arites) debated whether yad Allah is literal or figurative. The bilā kayf doctrine ('without asking how') attempts to preserve both readings simultaneously, making this a kinaya with an unresolved covert path."
    confidence: "high"
    recode_note: "v2.0→v3.0: x_type 0.4 (scalar) → [0.50, 0.45, 0.05] (r, e, s). y_vector updated: added 'Formal' — the bilā kayf theological doctrine functions as a formal/institutional structure that prevents resolution of the covert path, qualifying as v3.0 Formal vector. Hybrid (not R-dominant like mundane kinaya) due to active theological E component."

