  key_findings: |
    **v3.0 Reinterpretation: Kinaya as Refuge, Tevriye as Enchant**
    The major finding of the v3.0 recoding is a clear tradition-level X-axis split. All four
    mundane kinaya items (MET_006–009) shifted from E-dominant (v2.0 coding treated kinaya
    as 'active rhetorical invention') to R-dominant (r=0.80) because kinaya's fundamental
    function is indirect/euphemistic expression — the surface expression avoids saying something
    directly, which constitutes Refuge under v3.0 definitions. By contrast, all tevriye items
    (MET_013–016) are E-dominant (e=0.85–0.90) because tevriye involves active construction of
    phonetic/semantic ambiguity with no taboo-avoidance motive. This tradition-level X-axis
    divergence (kinaya=R, tevriye=E) was masked in v2.0's scalar system.

    **New Formal Vector: 4 Items Across Three Subtypes**
    v3.0 identifies four items where the FORM of expression carries the covert path: (1) MET_005
    (Maqāmāt genre structure — the episodic trickster narrative's formal architecture enables
    CPG); (2) MET_010 and MET_011 (divine kinaya — the bilā kayf theological doctrine is a
    formal/institutional structure that institutionally prevents resolution of the covert path);
    (3) MET_012 (Fuzuli's pen name in maqta' — the Ottoman ghazal's formal closing-couplet
    pen-name device makes this tevriye structurally load-bearing across the entire divan). All
    three Formal subtypes are structurally distinct: genre-level (MET_005), doctrinal-level
    (MET_010–011), and compositional-form level (MET_012).

    **Tawriya: Balanced R/E Hybrids; No S in Middle East**
    Tawriya items cluster in the hybrid zone (r≈0.35–0.45, e≈0.50–0.65) because the mechanism
    involves both hiding the far meaning (R) and actively selecting polysemous words for rhetorical
    effect (E). The Middle East shows zero S-dominant items — no tradition in this dataset relies
    on the binary juxtaposition mechanism (difrasismo-style) that generates a third meaning from
    two elements. S values are trace (0.05) across all 16 items. This S=0 pattern distinguishes
    the Middle East from predicted S-heavy traditions (Maya, Norse kenning). The S absence is
    confirmed by all three Arabic/Turkish traditions: tawriya (single word polysemy), kinaya
    (inferential chains), tevriye (word-boundary parsing) — none require element juxtaposition.
