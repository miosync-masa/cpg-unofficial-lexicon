    x_type: [0.80, 0.15, 0.05]  # (r, e, s): R-dominant — kinaya is indirect/euphemistic expression (v3.0 R direction); indirect praise avoids bluntness
    x_rationale: "v3.0 reinterpretation: Kinaya is fundamentally indirect/euphemistic expression — saying 'long of baldric' instead of 'tall' chooses an inferential route to avoid direct statement. This is Refuge-dominant (r=0.80) in v3.0 framework where R = 'avoiding direct expression'. Residual E (e=0.15) for the skilled construction of the baldric-inference chain. No S. NOTE: Original v2.0 coding had x_type=0.85 treating kinaya as 'Pure Enchant direction' — this is reversed in v3.0 based on kinaya's fundamental nature as euphemistic/indirect expression."
    y_vector: "Structural"
    y_detail: "The baldric (nijād: sword belt/strap) length is proportional to the wearer's stature. The structural/functional relationship between body height and baldric length provides the inferential vector: long baldric → tall body."
    z_register: 3
    z_rationale: "Universally cited in Arabic rhetoric education as the canonical example of kinaya al-ṣifa (kinaya encoding a quality/attribute). Appears in all major Arabic balagha textbooks."
    source: "ISSA Proceedings 2002: 'Kinâya, A Tropic Device From Medieval Arabic Rhetoric'; Brill Encyclopedia of Arabic Language and Linguistics: 'Kināya'; ResearchGate: 'The Intricate Nature of Kināyah and Its Interaction with Other English Figures of Speech' (2023)"
    notes: "Classic kinaya al-ṣifa (كناية عن صفة): surface expression attributes a physical property (long baldric) that implies a quality (tall stature). The inferential chain is transparent once glossed; its covert force depends on the listener reconstructing the chain."
    confidence: "high"
    recode_note: "v2.0→v3.0: x_type 0.85 (scalar, E-dominant) → [0.80, 0.15, 0.05] (r, e, s, R-dominant). MAJOR REVERSAL. v3.0 reframes kinaya as Refuge-dominant (婉曲/indirect expression = avoiding directness). Original coding treated kinaya as Enchant (actively constructing expression); v3.0 foregrounds the indirect/euphemistic function as Refuge."

