  - id: "MET_012"
    tradition: "tevriye"
    language: "Ottoman Turkish / Arabic origin"
    host_word: "فُضُولِي / Fuzûlî"
    host_romanized: "Fuzūlī"
    covert_target: "man of learning and arts — fuzūl as plural of fazl (فَضْل = excellence/learning) (far/hidden meaning); impertinent / unnecessary / meddlesome (near/surface meaning)"
    x_type: [0.40, 0.55, 0.05]  # (r, e, s): E-moderate, R notable — self-deprecating surface hides proud far meaning (R); active dual-meaning pen-name construction (E); no S
    x_rationale: "v3.0: The self-deprecating near meaning ('impertinent') hides the proud far meaning ('man of learning') — the poet uses Refuge (r=0.40) to avoid the appearance of boasting while secretly asserting mastery. The active construction of this double-valence pen name is Enchant (e=0.55). Tevriye is E-dominant generally; this item has a notable R component not typical of tevriye due to its specific self-concealment purpose. No S."
    y_vector: "Phonetic+Conceptual+Formal"
    y_detail: "The Ottoman pen name Fuzūlī sounds identical to Arabic fuzūlī (impertinent). But fuzūl is also the plural of fazl (excellence/learning), phonetically/rhythmically parallel to ʿulūm (sciences) and funūn (arts). Fuzuli himself explains this tevriye in his divan preface. FORMAL vector: in Ottoman/Persian divan poetry, the pen name (makhlas/takhallus) is conventionally embedded in the final couplet (maqta') of a ghazal — this formal device of pen-name closure makes the tevriye structurally load-bearing for the entire ghazal's formal identity. The form (pen-name-in-maqta') carries the covert path across Fuzuli's entire career."
    z_register: 3
    z_rationale: "Fuzuli (c. 1483–1556) is one of the greatest Ottoman/Azeri/Iraqi poets; his self-explanation of the pen-name tevriye is documented in his own prefaces and in every major Ottoman literary history."
    source: "Fuzûlî entry, en-academic.com; Ottoman poetry Wikipedia; Ohio State Press 'Windows into Turkish Culture'; Britannica 'Turkish Literature'"
    notes: "A uniquely self-referential tevriye: the covert path is embedded in the poet's own identity across his entire literary career. Fuzuli explicitly states he chose the name so no rival would wish to claim it (near: insult) while secretly proclaiming his learning (far: praise)."
    confidence: "high"
    recode_note: "v2.0→v3.0: x_type 0.5 (scalar) → [0.40, 0.55, 0.05] (r, e, s). y_vector updated: added 'Formal' — the Ottoman ghazal maqta' (closing couplet pen-name convention) is a formal poetic structure through which the tevriye operates across Fuzuli's entire divan."

